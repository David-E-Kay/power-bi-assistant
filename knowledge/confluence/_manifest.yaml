# Confluence Page Cache Manifest
#
# Owned by: .claude/skills/confluence-cache/SKILL.md
# Schema:   .claude/skills/confluence-cache/references/manifest-format.md
#
# Each entry under `pages:` is one cached Confluence page committed to
# knowledge/confluence/<slug>.md. The confluence-cache skill writes/updates
# entries here after every successful fetch. Hand-edits are allowed — on
# the next skill run, new entries are back-filled (fetched + stored).
#
# Removing an entry here does NOT delete the cached .md file. Use the
# skill's "remove" branch (which deletes both) or remove both manually.
#
# OPTIONAL INTEGRATION — empty by default. Confluence caching is OFF until you
# configure `site` below and cache your first page (see
# .claude/skills/confluence-cache/references/setup.md). With a null
# `site.cloud_id` and an empty `pages:` list, the skill's pre-flight reports
# "not configured → run setup" and stops cleanly. If you don't use Confluence,
# leave this file as-is and route any Confluence questions to the live
# Atlassian MCP instead.

site:
  cloud_id: null
  url: https://<your-org>.atlassian.net
  # Default space for "list pages in our space" queries. The skill can
  # still cache pages from any space the user references by URL or ID.
  primary_space:
    key: null
    id: null
    name: null

pages: []
